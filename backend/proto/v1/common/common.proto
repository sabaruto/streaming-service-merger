syntax = "proto3";

package v1.common;
option go_package = "github.com/sabaruto/streaming-service-merger/backend/genproto/v1/common";

import "google/protobuf/empty.proto";

message AuthenticateResponse {
    oneof result {
      google.protobuf.Empty success = 1;
      AuthenticateFailure error = 2;
    }
  }

message AuthenticateFailure {
    int32 errorCode = 1;
    string errorMessage = 2;
}